limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=60r/s;

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server_tokens off;

server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 20m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  keepalive_timeout 20s;
  send_timeout 10s;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; frame-ancestors 'none';" always;

  if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) {
    return 405;
  }

  location ~ /\.(?!well-known).* {
    deny all;
    return 404;
  }

  location ~* (?:\.(?:bak|conf|dist|ini|log|ps1|sh|sql|swp)|(?:docker-compose|package-lock|pnpm-lock)\.?)$ {
    deny all;
    return 404;
  }

  location /api/internal/ {
    deny all;
    return 403;
  }

  location /api/ {
    limit_req zone=api_limit burst=40 nodelay;
    proxy_pass http://greenclaw-gateway:18789;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    proxy_pass http://greenclaw-frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  location / {
    limit_req zone=global_limit burst=80 nodelay;
    proxy_pass http://greenclaw-frontend:3000;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  error_page 429 = /429.json;
  error_page 500 502 503 504 = /50x.json;

  location = /429.json {
    default_type application/json;
    return 429 '{"error":"too_many_requests","message":"Rate limit exceeded"}';
  }

  location = /50x.json {
    default_type application/json;
    return 503 '{"error":"service_unavailable","message":"Upstream temporarily unavailable"}';
  }
}
