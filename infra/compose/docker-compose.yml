name: greenclaw

services:
  frontend:
    image: node:20-alpine
    container_name: greenclaw-frontend
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter frontend dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../../:/app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      NEXT_PUBLIC_CALC_API_BASE_URL: http://localhost:${CALC_ENGINE_PORT:-8000}
    depends_on:
      - backend
      - calc-engine
    networks:
      - greenclaw-net

  backend:
    image: node:20-alpine
    container_name: greenclaw-backend
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter backend dev"
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ../../:/app
    environment:
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-gc_access}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-gc_refresh}
      REDIS_URL: redis://redis:6379
      CALC_ENGINE_URL: http://calc-engine:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MEMORY_PROVIDER: ${MEMORY_PROVIDER:-sqlite}
      MEMORY_SQLITE_PATH: /app/data/greenclaw.db
    depends_on:
      - redis
      - calc-engine
    networks:
      - greenclaw-net

  calc-engine:
    image: python:3.11-slim
    container_name: greenclaw-calc-engine
    working_dir: /app/packages/calculation
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${CALC_ENGINE_PORT:-8000}:8000"
    volumes:
      - ../../:/app
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: info
      GB_RULESET_VERSION: ${GB_RULESET_VERSION:-GB_T_50378_2019}
      ENERGYPLUS_PATH: ${ENERGYPLUS_PATH:-}
    networks:
      - greenclaw-net

  redis:
    image: redis:7-alpine
    container_name: greenclaw-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - greenclaw-net

  nginx:
    image: nginx:1.27-alpine
    container_name: greenclaw-nginx
    profiles: ["edge"]
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-http://frontend:3000}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:4000}
    depends_on:
      - frontend
      - backend
    networks:
      - greenclaw-net

volumes:
  redis_data:

networks:
  greenclaw-net:
    driver: bridge
