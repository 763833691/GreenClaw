services:
  greenclaw-gateway:
    environment:
      NODE_ENV: production
      COOKIE_SECURE: "true"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://localhost}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 18789
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - gateway_data:/workspace/data
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    cpus: "1.0"
    mem_limit: 1024m

  greenclaw-frontend:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://localhost}
      NEXT_PUBLIC_CALC_API_BASE_URL: ${NEXT_PUBLIC_CALC_API_BASE_URL:-https://localhost}
    volumes: []
    cpus: "1.0"
    mem_limit: 1024m

  python-calculator:
    environment:
      LOG_LEVEL: ${PYTHON_LOG_LEVEL:-warning}
    volumes: []
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    cpus: "1.0"
    mem_limit: 3g

  redis:
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    cpus: "0.5"
    mem_limit: 512m

  nginx:
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    cpus: "0.5"
    mem_limit: 512m

volumes:
  gateway_data:
